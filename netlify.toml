# Mason Jar Films — Netlify Configuration

[build]
  publish = "."

# Clean URLs — /films instead of /films.html
[[redirects]]
  from = "/films"
  to = "/films.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

# 404 fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
